name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  python-distributions:
    name: Build Python distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build wheel and source archive
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  native-binaries:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: git-command-center-linux
          - os: macos-latest
            asset: git-command-center-macos
          - os: windows-latest
            asset: git-command-center-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project and PyInstaller
        run: python -m pip install -e ".[dev]"

      - name: Build native executable
        run: python -m PyInstaller --clean --noconfirm git-command-center.spec

      - name: Prepare Unix asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-assets
          mv dist/git-command-center "release-assets/${{ matrix.asset }}"
          chmod +x "release-assets/${{ matrix.asset }}"

      - name: Prepare Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Move-Item dist/git-command-center.exe "release-assets/${{ matrix.asset }}"

      - name: Smoke-test executable
        shell: bash
        run: "release-assets/${{ matrix.asset }} --help"

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ runner.os }}
          path: release-assets/*
          if-no-files-found: error

  container-package:
    name: Publish GHCR package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and publish container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Publish GitHub release
    needs: [python-distributions, native-binaries, container-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes/v0.1.0.md
          files: release-assets/*
          fail_on_unmatched_files: true
