lesson.beginner: |-
  # Iniciante: as três áreas do Git

  O Git mantém o trabalho em três áreas: **diretório de trabalho**, **área de preparação** e **repositório**.

  1. Edite um arquivo.
  2. Selecione-o com `git add`.
  3. Crie um snapshot com `git commit`.

  ## Pergunta

  `git add` publica o arquivo? **Não**: ele apenas prepara o próximo commit local.

  ## Exercício

  Edite `README.md` na sandbox, verifique `git status`, adicione o arquivo e crie um commit.
lesson.intermediate: |-
  # Intermediário: branches e integração

  Um branch é uma referência móvel para um commit. Mantenha branches pequenos e focados.

  ## Pergunta

  Onde estar antes de `git merge feature`? No branch que deve receber o trabalho.

  ## Exercício

  Crie `feature/demo`, adicione um commit, volte para `main` e faça o merge.
lesson.advanced: |-
  # Avançado: rebase e reflog

  Rebase reescreve commits. Use-o em trabalho local, não em histórico compartilhado. O reflog registra movimentos locais e costuma encontrar commits perdidos.

  ## Pergunta

  Por que os hashes mudam após rebase? O pai muda e, portanto, o conteúdo do commit também.

  ## Exercício

  Crie dois branches divergentes, execute rebase e compare `git log --graph --all`.
lesson.expert: |-
  # Especialista: colaboração e recuperação

  Antes de alterar histórico publicado, identifique responsáveis, branches protegidos e estratégia de reversão. Use `--force-with-lease` somente em branches pessoais acordados.

  ## Pergunta

  O que `--force-with-lease` protege? Evita sobrescrever uma referência remota alterada desde sua última observação.

  ## Exercício

  Simule um reset, encontre o commit antigo no reflog e recrie um branch apontando para ele.
