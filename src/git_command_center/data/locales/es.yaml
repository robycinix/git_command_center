lesson.beginner: |-
  # Principiante: las tres áreas de Git

  Git guarda el trabajo en tres áreas: **árbol de trabajo**, **área de preparación** y **repositorio**.

  1. Edita un archivo.
  2. Selecciónalo con `git add`.
  3. Crea una instantánea con `git commit`.

  ## Pregunta

  ¿`git add` publica el archivo? **No**: solo prepara el siguiente commit local.

  ## Ejercicio

  Edita `README.md` en el entorno seguro, revisa `git status`, añade el archivo y crea un commit.
lesson.intermediate: |-
  # Intermedio: ramas e integración

  Una rama es una referencia móvil a un commit. Mantén las ramas pequeñas y enfocadas.

  ## Pregunta

  ¿Dónde debes estar antes de `git merge feature`? En la rama que debe recibir el trabajo.

  ## Ejercicio

  Crea `feature/demo`, añade un commit, vuelve a `main` y fusiona la rama.
lesson.advanced: |-
  # Avanzado: rebase y reflog

  Rebase reescribe commits. Úsalo en trabajo local, no en historial compartido. Reflog registra movimientos locales y suele encontrar commits perdidos.

  ## Pregunta

  ¿Por qué cambian los hashes tras rebase? Cambia el padre y por tanto el contenido del commit.

  ## Ejercicio

  Crea dos ramas divergentes, ejecuta rebase y compara `git log --graph --all`.
lesson.expert: |-
  # Experto: colaboración y recuperación

  Antes de cambiar historial publicado, identifica propietarios, ramas protegidas y estrategia de reversión. Usa `--force-with-lease` solo en ramas personales acordadas.

  ## Pregunta

  ¿Qué protege `--force-with-lease`? Evita sobrescribir una referencia remota que cambió desde tu última observación.

  ## Ejercicio

  Simula un reset, encuentra el commit anterior en reflog y crea una rama que lo apunte.
