lesson.beginner: |-
  # Beginner: Git's three areas

  Git keeps work in three areas: the **worktree**, **staging area** and **repository**.

  1. Edit a file in the worktree.
  2. Select it with `git add`.
  3. Create a snapshot with `git commit`.

  ## Quiz

  Does `git add` publish the file online? **No**: it only prepares the next local commit.

  ## Exercise

  In the sandbox, edit `README.md`, inspect `git status`, add the file and create a commit.
lesson.intermediate: |-
  # Intermediate: branches and integration

  A branch is a movable reference to a commit. Keep branches small and focused.

  ## Quiz

  Where should you be before `git merge feature`? On the branch that should receive the work.

  ## Exercise

  Create `feature/demo`, add a commit, return to `main` and merge it.
lesson.advanced: |-
  # Advanced: rebase and reflog

  Rebase rewrites commits. Use it on local work, not shared history. Reflog records local reference movements and often finds an apparently lost commit.

  ## Quiz

  Why do hashes change after rebase? The parent changes, so the commit content changes.

  ## Exercise

  Create two diverging branches in the sandbox, rebase and compare `git log --graph --all`.
lesson.expert: |-
  # Expert: collaboration and recovery

  Before changing published history, identify owners, protected branches and a rollback strategy. Prefer `--force-with-lease` to `--force`, only on agreed personal branches.

  ## Quiz

  What does `--force-with-lease` protect? It blocks overwriting a remote reference that changed since your last local observation.

  ## Exercise

  Simulate a reset, find the old commit in reflog and recreate a branch pointing to it.
