lesson.beginner: |-
  # Débutant : les trois zones de Git

  Git conserve le travail dans trois zones : **répertoire de travail**, **index** et **dépôt**.

  1. Modifiez un fichier.
  2. Sélectionnez-le avec `git add`.
  3. Créez un instantané avec `git commit`.

  ## Quiz

  `git add` publie-t-il le fichier ? **Non** : il prépare seulement le prochain commit local.

  ## Exercice

  Modifiez `README.md` dans le bac à sable, vérifiez `git status`, ajoutez le fichier et commitez.
lesson.intermediate: |-
  # Intermédiaire : branches et intégration

  Une branche est une référence mobile vers un commit. Gardez les branches petites et ciblées.

  ## Quiz

  Où faut-il être avant `git merge feature` ? Sur la branche qui doit recevoir le travail.

  ## Exercice

  Créez `feature/demo`, ajoutez un commit, revenez sur `main` et fusionnez.
lesson.advanced: |-
  # Avancé : rebase et reflog

  Rebase réécrit les commits. Utilisez-le sur du travail local, pas sur un historique partagé. Reflog enregistre les déplacements locaux et retrouve souvent un commit perdu.

  ## Quiz

  Pourquoi les hashes changent-ils après rebase ? Le parent change, donc le contenu du commit aussi.

  ## Exercice

  Créez deux branches divergentes, rebasez et comparez `git log --graph --all`.
lesson.expert: |-
  # Expert : collaboration et récupération

  Avant de modifier un historique publié, identifiez les responsables, branches protégées et stratégie d'annulation. Utilisez `--force-with-lease` seulement sur des branches personnelles convenues.

  ## Quiz

  Que protège `--force-with-lease` ? Il empêche d'écraser une référence distante modifiée depuis votre dernière observation.

  ## Exercice

  Simulez un reset, retrouvez l'ancien commit dans le reflog et recréez une branche dessus.
