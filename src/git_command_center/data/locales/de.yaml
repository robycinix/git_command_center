lesson.beginner: |-
  # Anfänger: Die drei Bereiche von Git

  Git verwaltet Arbeit in drei Bereichen: **Arbeitsverzeichnis**, **Staging Area** und **Repository**.

  1. Bearbeite eine Datei.
  2. Wähle sie mit `git add` aus.
  3. Erstelle mit `git commit` einen Snapshot.

  ## Quiz

  Veröffentlicht `git add` eine Datei online? **Nein**: Es bereitet nur den nächsten lokalen Commit vor.

  ## Übung

  Bearbeite `README.md` in der Sandbox, prüfe `git status`, füge die Datei hinzu und committe sie.
lesson.intermediate: |-
  # Fortgeschritten: Branches und Integration

  Ein Branch ist eine bewegliche Referenz auf einen Commit. Halte Branches klein und fokussiert.

  ## Quiz

  Wo musst du vor `git merge feature` sein? Auf dem Branch, der die Arbeit erhalten soll.

  ## Übung

  Erstelle `feature/demo`, committe eine Änderung, kehre zu `main` zurück und merge.
lesson.advanced: |-
  # Erweitert: Rebase und Reflog

  Rebase schreibt Commits neu. Nutze es für lokale Arbeit, nicht für gemeinsame Historie. Reflog zeichnet lokale Referenzbewegungen auf und findet oft verlorene Commits.

  ## Quiz

  Warum ändern sich Hashes nach einem Rebase? Der Parent und damit der Commit-Inhalt ändern sich.

  ## Übung

  Erstelle zwei divergierende Branches, führe einen Rebase aus und vergleiche `git log --graph --all`.
lesson.expert: |-
  # Experte: Zusammenarbeit und Wiederherstellung

  Vor Änderungen an veröffentlichter Historie müssen Eigentümer, geschützte Branches und Rollback geklärt sein. Nutze `--force-with-lease` nur auf vereinbarten persönlichen Branches.

  ## Quiz

  Was schützt `--force-with-lease`? Es verhindert das Überschreiben einer seit der letzten Prüfung geänderten Remote-Referenz.

  ## Übung

  Simuliere einen Reset, finde den alten Commit im Reflog und erstelle einen Branch darauf.
